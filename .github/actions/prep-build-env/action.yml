name: "Prepare nix build environment"

inputs:
  NIX_CACHE_ACCESS_KEY_ID:
    required: true

  NIX_CACHE_SECRET_ACCESS_KEY:
    required: true

  NIX_BINARY_CACHE_PRIVATE_KEY:
    required: true

  # these are not intended to be configurable, but there's simply no way
  # to have constants/envs in a composite action
  NIX_CACHE_S3_BUCKET:
    default: dividat-ci-nix-cache

  NIX_CACHE_S3_PROFILE:
    default: nixcache

  NIX_CACHE_S3_REGION:
    default: eu-central-1

  NIX_STORE_PUBLIC_KEY:
    default: "dividat-ci-nix-cache-1:vhWwMmDRyiG7ICbeWWpC03k1XsRs2fIQB461il3EL3U="

  NIX_STORE_PRIVATE_KEY_FILE:
    default: "/etc/nix/key.private"
runs:
  using: "composite"
  steps:
  - name: Ensure KVM is usable by nix-build
    run: sudo chmod a+rwx /dev/kvm
    shell: bash

  - name: Install task-spooler
    run: |
      sudo apt-get update
      sudo apt-get install -y task-spooler
    shell: bash

  - name: Write private key to file
    shell: bash
    run: |
      sudo mkdir -p $(dirname "${{ inputs.NIX_STORE_PRIVATE_KEY_FILE }}")
      echo -n "${{ inputs.NIX_BINARY_CACHE_PRIVATE_KEY }}" | sudo tee "${{ inputs.NIX_STORE_PRIVATE_KEY_FILE }}"

  - name: Creates AWS credentials and config for profile
    shell: bash
    run: |
      mkdir -p ~/.aws

      echo "[${{ inputs.NIX_CACHE_S3_PROFILE }}]" >> ~/.aws/credentials
      echo "aws_access_key_id=${{ inputs.NIX_CACHE_ACCESS_KEY_ID }}" >> ~/.aws/credentials
      echo "aws_secret_access_key=${{ inputs.NIX_CACHE_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials

      echo "[profile ${{ inputs.NIX_CACHE_S3_PROFILE }}]" > ~/.aws/config
      echo "region=${{ inputs.NIX_CACHE_S3_REGION }}" >> ~/.aws/config
  - run: aws configure list --profile ${{ inputs.NIX_CACHE_S3_PROFILE }}
    shell: bash

  - name: Install post-run action
    uses: gacts/run-and-post-run@v1
    with:
      post: |
        echo "Waiting for cache uploads to finish"
        tsp -w || true
        tsp -l


  - uses: cachix/install-nix-action@v18
    with:
      nix_path: nixpkgs=channel:nixos-unstable
      extra_nix_config: |
        system-features = nixos-test benchmark big-parallel kvm
        substituters = https://cache.nixos.org/ s3://${{ inputs.NIX_CACHE_S3_BUCKET }}?profile=${{ inputs.NIX_CACHE_S3_PROFILE }}
        trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= ${{ inputs.NIX_STORE_PUBLIC_KEY }}
        secret-key-files = ${{ inputs.NIX_STORE_PRIVATE_KEY_FILE }}
        post-build-hook = ${{ github.workspace }}/.github/workflows/upload-to-s3-cache.sh

  - run: ls -l /etc/nix/
    shell: bash
