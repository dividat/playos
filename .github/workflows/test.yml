name: "Test"
on:
  pull_request:
  push:
jobs:
  build-something:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/actions/prep-build-env
      with:
        NIX_CACHE_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_ACCESS_KEY_ID }}
        NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
        NIX_BINARY_CACHE_PRIVATE_KEY: ${{ secrets.NIX_BINARY_CACHE_PRIVATE_KEY }}

    - run: nix copy $(nix-build --expr '(import <nixpkgs> {}).writeText "example" (builtins.toString builtins.currentTime)') --to file:///tmp/nix-store-tmp
    #- run: NIXPKGS_ALLOW_UNFREE=1 nix-build testing/integration/rauc-statusfile-recovery.nix
